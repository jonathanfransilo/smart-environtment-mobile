name: sirkular_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.9
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.0
  shimmer: ^3.0.0
  another_flushbar: ^1.12.30
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  geocoding: ^2.1.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.0
  geolocator: ^13.0.1
  blur: ^3.0.0
  image_picker: ^1.1.2
  intl: ^0.19.0
  google_maps_flutter: ^2.7.0
  url_launcher: ^6.3.0
  pdf: ^3.10.8
  printing: ^5.12.0
  path_provider: ^2.1.2
  qr_flutter: ^4.1.0
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
        - asset: assets/fonts/Poppins-SemiBold.ttf
        - asset: assets/fonts/Poppins-Bold.ttf


