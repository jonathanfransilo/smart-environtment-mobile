name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4
      
      - name: Login to Dockerhub
        uses: docker/login-action@v1
        with:
          registry: https://ghcr.io
          username: ${{ secrets.PACKAGE_USERNAME }}
          password: ${{ secrets.PACKAGE_TOKEN }}
      
      - name: Get flutter
        uses: subosito/flutter-action@v2
        with: 
          channel: 'stable' 
          
      - name: Build flutter
        run: |  
          flutter config --enable-web
          flutter pub get
          flutter build web --release

      - name: Push Docker image
        run: | 
          mkdir build/web/.docker
          cp .docker/Dockerfile build/web/.docker/Dockerfile
          cp .docker/nginx.conf build/web/.docker/nginx.conf
          cd build/web
          docker build -t ghcr.io/citiasia-inc/smart-environment-mobile:latest -f .docker/Dockerfile .
          docker push ghcr.io/citiasia-inc/smart-environment-mobile:latest
      
      - name: Copy docker-compose file to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }} 
          source: .docker/docker-compose.yml
          target: /home/app/smart-environment-mobile/
          strip_components: 1
        
      - name: Deploy docker-compose on VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: | 
            cd /home/app/smart-environment-mobile/
            sudo docker compose stop
            sudo docker compose rm -f
            sudo docker compose pull 
            sudo docker compose up -d
